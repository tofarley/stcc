<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}STCC Solo Bot{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="site-header">
    <span class="site-title">STAR TREK CAPTAIN'S CHAIR — Solo Bot</span>
    {% if 'game' in session %}
    <form method="POST" action="/game/reset" style="display:inline">
      <button class="btn btn-ghost btn-sm">↩ New Game</button>
    </form>
    {% endif %}
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
